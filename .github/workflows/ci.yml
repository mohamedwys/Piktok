name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Avoid duplicate runs when a PR is merged.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Mobile typecheck + expo-doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install mobile deps
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Expo Doctor
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx expo-doctor

  web:
    name: Web typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit
